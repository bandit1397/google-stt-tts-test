<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>A/B Translator</title>
</head>
<body>

<h2>🔥 A/B 실시간 통역 시스템</h2>

<hr>

<!-- 역할 선택 -->
<button onclick="joinA()">A (한국어 사용자)</button>
<button onclick="joinB()">B (영어 사용자)</button>

<hr>

<!-- 🎤 마이크 권한 -->
<button onclick="enableMic()">🎤 마이크 권한 허용</button>

<!-- 🎤 음성 인식 시작 -->
<button onclick="startSpeech()">🎤 말하기 시작</button>

<hr>

<!-- A 화면 -->
<div>
    <h3>A 화면 (내가 말한 내용)</h3>
    <div id="myText" style="font-size:20px; color:blue;"></div>
</div>

<hr>

<!-- B 화면 -->
<div>
    <h3>B 화면 (번역 결과)</h3>
    <div id="translatedText" style="font-size:20px; color:green;"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let roomId = "room1";
let role = null;

/* ======================
   A / B 입장
====================== */
function joinA() {
    role = "A";

    socket.emit("join-room", {
        roomId: roomId,
        role: role
    });

    alert("A 입장 완료");
}

function joinB() {
    role = "B";

    socket.emit("join-room", {
        roomId: roomId,
        role: role
    });

    alert("B 입장 완료");
}

/* ======================
   🎤 마이크 권한 요청 (핵심)
====================== */
async function enableMic() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("마이크 활성화 성공");
        alert("마이크 허용 완료");
    } catch (err) {
        console.error("마이크 오류:", err);
        alert("마이크 허용 실패");
    }
}

/* ======================
   음성 인식
====================== */
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

recognition.lang = "ko-KR";
recognition.continuous = true;
recognition.interimResults = false;

/* 내가 말한 내용 → 서버 전송 */
recognition.onresult = (event) => {

    const text = event.results[event.results.length - 1][0].transcript;

    console.log("speech:", text);

    socket.emit("speech", {
        text: text,
        roomId: roomId
    });
};

/* 시작 */
function startSpeech() {
    recognition.start();
    alert("음성 인식 시작");
}

/* ======================
   A 화면 표시
====================== */
socket.on("my-text", (text) => {
    document.getElementById("myText").innerText = text;
});

/* ======================
   B 화면 표시
====================== */
socket.on("translated-text", (text) => {
    document.getElementById("translatedText").innerText = text;
});

</script>

</body>
</html>
